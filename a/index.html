<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-itunes-app" content="app-id=6790863136" />
<title>عيار — افتح في التطبيق</title>
<style>
  :root { color-scheme: light; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tajawal, sans-serif;
    background: #FAF7F2;
    color: #2A2420;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 32px 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 24px rgba(42,36,32,0.08);
  }
  h1 { font-size: 22px; margin: 8px 0 4px; }
  p { font-size: 15px; color: #7C7570; margin: 0 0 24px; line-height: 1.5; }
  .emoji { font-size: 48px; }
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 9999px;
    background: #C46538;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .btn.secondary {
    background: #F2EDE5;
    color: #2A2420;
  }
  small { color: #B5AEA9; font-size: 12px; }
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">🍽️</div>
    <h1>افتح في تطبيق عيار</h1>
    <p id="copy">تمت مشاركة وصفة معك. افتح الرابط في تطبيق عيار.</p>
    <a id="appBtn" class="btn" href="#">افتح التطبيق</a>
    <a id="storeBtn" class="btn secondary" href="#">تنزيل عيار</a>
    <small id="hint">إذا لم يفتح التطبيق تلقائياً، اضغط على "افتح التطبيق" أعلاه.</small>
  </div>

<script>
(function () {
  // Path is /a/{id}.
  var parts = location.pathname.split('/').filter(Boolean);
  var id = parts[parts.length - 1];
  if (!id || id === 'index.html' || id === 'a') {
    document.getElementById('copy').textContent = 'لا يوجد رابط مشاركة في عنوان URL.';
    return;
  }

  var schemeUrl = 'ayar://share/' + id;
  document.getElementById('appBtn').href = schemeUrl;

  var ua = navigator.userAgent || '';
  var isIOS = /iPhone|iPad|iPod/i.test(ua);

  var iosStore = 'https://apps.apple.com/app/id6790863136';

  var storeBtn = document.getElementById('storeBtn');

  if (!isIOS) {
    // iOS-only for now — no Play Store listing yet. Hide the app buttons and
    // tell non-iOS visitors to open the link on an iPhone.
    storeBtn.style.display = 'none';
    document.getElementById('appBtn').style.display = 'none';
    document.getElementById('hint').textContent = 'افتح هذا الرابط على جهاز آيفون لتشغيل تطبيق عيار.';
    return;
  }

  storeBtn.href = iosStore;

  // Auto-flow on iOS:
  //  • App installed  → the ayar:// scheme opens it on the recipe; the page
  //    goes to the background, so we cancel the App Store fallback.
  //  • Not installed  → the scheme does nothing; after a short wait we send
  //    the user straight to the App Store to download عيار.
  // The buttons above remain as a manual fallback either way.
  var storeTimer = setTimeout(function () {
    if (!document.hidden) window.location.href = iosStore;
  }, 1500);

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) clearTimeout(storeTimer);
  });
  window.addEventListener('pagehide', function () {
    clearTimeout(storeTimer);
  });

  // Attempt to open the app.
  window.location.href = schemeUrl;
})();
</script>
</body>
</html>
